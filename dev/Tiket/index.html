    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const sheetId = "1W7xTZyNoGdkgrtYkL--B4pZd6Qj6JVT5xv4v1ZHjzWE";
        const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

        fetch(url)
          .then((response) => response.text())
          .then((data) => {
            const jsonString = data.substring(data.indexOf("{"), data.lastIndexOf("}") + 1);
            const jsonData = JSON.parse(jsonString);

            const cols = jsonData.table.cols;
            const rows = jsonData.table.rows;

            // Target kolom dari spreadsheet (Nama_Pelapor dihapus)
            const targetColumns = ["ID_Tiket", "Nama_Aplikasi", "Nama_Modul", "ID_Ref", "Info_Referensi", "Keterangan", "Kategori", "Prioritas", "Status"];

            const columnIndices = [];

            // 1. TAMBAHIN HEADER 'NO' DI AWAL
            const finalHeaders = [{ title: "No", className: "text-center", width: "5%" }];

            targetColumns.forEach((target) => {
              const index = cols.findIndex((col) => col && col.label === target);
              if (index !== -1) {
                columnIndices.push(index);
                finalHeaders.push({ title: target });
              } else {
                console.warn(`Kolom "${target}" tidak ditemukan di Spreadsheet.`);
              }
            });

            // 2. TAMBAHIN HEADER 'AKSI' DI AKHIR
            finalHeaders.push({ title: "Aksi", className: "text-center text-nowrap" });

            const dataSet = [];

            rows.forEach((row) => {
              // 3. TAMBAHIN KOTAK KOSONG UNTUK NOMOR URUT DI AWAL ARRAY
              const rowData = [""];
              let idTiket = "";

              columnIndices.forEach((index, idx) => {
                const cell = row.c[index];
                let cellValue = "";

                if (cell && cell.v !== null) {
                  if (typeof cell.v === "string" && cell.v.startsWith("Date(")) {
                    const dateMatch = cell.v.match(/Date\((\d+),\s*(\d+),\s*(\d+)/);
                    if (dateMatch) {
                      const year = dateMatch[1];
                      const month = String(parseInt(dateMatch[2]) + 1).padStart(2, "0");
                      const day = String(dateMatch[3]).padStart(2, "0");
                      cellValue = `${day}/${month}/${year}`;
                    } else {
                      cellValue = cell.v;
                    }
                  } else {
                    cellValue = cell.f !== undefined ? cell.f : cell.v;
                  }
                }

                if (targetColumns[idx] === "ID_Tiket") {
                  idTiket = cellValue;
                }

                rowData.push(cellValue);
              });

              // 4. MASUKIN ID_TIKET KE KOLOM PALING AKHIR BUAT TOMBOL AKSI
              rowData.push(idTiket);
              dataSet.push(rowData);
            });

            dataSet.reverse();

            if ($.fn.DataTable.isDataTable("#ticketTable")) {
              $("#ticketTable").DataTable().destroy();
            }

            document.getElementById("data-container").innerHTML = `
              <table id="ticketTable" class="table table-bordered table-hover align-middle w-100">
                <thead class="table-dark"></thead>
              </table>
            `;

            // 5. INISIALISASI DATATABLES
            $("#ticketTable").DataTable({
              data: dataSet,
              columns: finalHeaders,
              pageLength: 5,
              lengthMenu: [
                [5, 15, 20, -1],
                [5, 15, 20, "Semua"],
              ],
              scrollX: true,
              ordering: true,

              // order: [[0, "desc"]],

              columnDefs: [
                {
                  // Kolom No (Index 0)
                  targets: 0,
                  searchable: false,
                  orderable: false,
                  render: function (data, type, row, meta) {
                    return meta.row + 1;
                  },
                },
                {
                  // Kolom Kategori (Maju jadi Index 7)
                  targets: 7,
                  render: function (data, type, row) {
                    let badgeClass = "bg-secondary";
                    let text = data ? data.toLowerCase() : "";

                    if (text.includes("bug") || text.includes("error")) badgeClass = "bg-danger";
                    else if (text.includes("fitur") || text.includes("baru")) badgeClass = "bg-success";
                    else if (text.includes("revisi")) badgeClass = "bg-info text-dark";

                    return `<span class="badge ${badgeClass}">${data}</span>`;
                  },
                },
                {
                  // Kolom Prioritas (Maju jadi Index 8)
                  targets: 8,
                  render: function (data, type, row) {
                    let badgeClass = "bg-secondary";
                    let text = data ? data.toLowerCase() : "";

                    if (text === "tinggi" || text === "high" || text === "urgent") badgeClass = "bg-danger";
                    else if (text === "sedang" || text === "normal") badgeClass = "bg-warning text-dark";
                    else if (text === "rendah" || text === "low") badgeClass = "bg-info text-dark";

                    return `<span class="badge ${badgeClass}">${data}</span>`;
                  },
                },
                {
                  // Kolom Status (Maju jadi Index 9)
                  targets: 9,
                  render: function (data, type, row) {
                    let badgeClass = "bg-secondary";
                    let text = data ? data.toLowerCase() : "";

                    if (text === "open") badgeClass = "bg-primary";
                    else if (text === "in progress" || text === "pending") badgeClass = "bg-warning text-dark";
                    else if (text === "done" || text === "closed" || text === "resolved") badgeClass = "bg-success";

                    return `<span class="badge ${badgeClass}">${data}</span>`;
                  },
                },
                {
                  // Kolom Aksi (SEKARANG MAJU KE INDEX 10)
                  targets: 10,
                  searchable: false,
                  orderable: false,
                  render: function (data, type, row) {
                    return `
                      <div class="d-flex justify-content-center gap-1">
                        <button class="btn btn-sm btn-info text-white" title="Lihat Detail" onclick="alert('Membuka detail tiket: ${data}')">
                          <i class="bi bi-eye"></i>
                        </button>
                        <button class="btn btn-sm btn-warning text-dark" title="Edit Tiket" onclick="alert('Mengedit tiket: ${data}')">
                          <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-sm btn-danger" title="Hapus Tiket" onclick="alert('Menghapus tiket: ${data}')">
                          <i class="bi bi-trash"></i>
                        </button>
                      </div>
                    `;
                  },
                },
              ],

              language: {
                search: "Cari Tiket:",
                lengthMenu: "Tampilkan _MENU_ baris",
                info: "Menampilkan _START_ s/d _END_ dari total _TOTAL_ tiket",
                infoEmpty: "Data kosong",
                infoFiltered: "(disaring dari _MAX_ total tiket)",
                zeroRecords: "Tiket yang dicari tidak ditemukan",
                paginate: {
                  first: "Awal",
                  last: "Akhir",
                  next: "Selanjutnya",
                  previous: "Sebelumnya",
                },
              },
            });
          })
          .catch((error) => {
            console.error("Error fetching data:", error);
            document.getElementById("data-container").innerHTML = '<div class="alert alert-danger shadow-sm">Gagal memuat data. Pastikan Google Spreadsheet sudah di-Publish to the web.</div>';
          });
      });
