              <div class="col-md-6">
                <label class="form-label fw-semibold">Nama Pelapor / User</label>
                <input type="text" class="form-control" id="inputNamaPelapor" placeholder="Contoh: Pak Budi" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Nama Aplikasi</label>
                <input type="text" class="form-control" id="inputAplikasi" placeholder="Contoh: SIMPPM" required>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label fw-semibold">Nama Modul</label>
                <input type="text" class="form-control" id="inputModul" placeholder="Contoh: Monev Penelitian" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">ID Referensi (Opsional)</label>
                <input type="text" class="form-control" id="inputIDRef" placeholder="Contoh: 1111">

            <div class="row mb-3">

                <input type="text" class="form-control" id="inputInfoRef" placeholder="Contoh: Penelitian AI" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Kategori</label>
                <select class="form-select" id="inputKategori" required>
                  <option value="" selected disabled>Pilih kategori kendala...</option>
                  <option value="Bug">Bug / Error</option>
                  <option value="Fitur Baru">Fitur Baru</option>
                  <option value="Revisi">Revisi</option>
                </select>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label fw-semibold">Prioritas</label>
                <select class="form-select" id="inputPrioritas" required>
                  <option value="" selected disabled>Pilih tingkat prioritas...</option>
                  <option value="Tinggi">Tinggi (Urgent)</option>
                  <option value="Sedang">Sedang</option>
                  <option value="Rendah">Rendah</option>
                </select>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Keterangan / Detail Kendala</label>
              <textarea class="form-control" id="inputKeterangan" rows="4"
                placeholder="Jelaskan detail kendala secara lengkap di sini..." required></textarea>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const sheetId = "1W7xTZyNoGdkgrtYkL--B4pZd6Qj6JVT5xv4v1ZHjzWE";
      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

      fetch(url)
        .then((response) => response.text())
        .then((data) => {
          const jsonString = data.substring(data.indexOf("{"), data.lastIndexOf("}") + 1);
          const jsonData = JSON.parse(jsonString);

          const cols = jsonData.table.cols;
          const rows = jsonData.table.rows;

          const targetColumns = ["ID_Tiket", "Nama_Aplikasi", "Nama_Modul", "ID_Ref", "Info_Referensi", "Keterangan", "Kategori", "Prioritas", "Status"];

          const columnIndices = [];
          const finalHeaders = [{ title: "No", className: "text-center", width: "5%" }];

          targetColumns.forEach((target) => {
            const index = cols.findIndex((col) => col && col.label === target);
            if (index !== -1) {
              columnIndices.push(index);
              finalHeaders.push({ title: target });
            }
          });

          finalHeaders.push({ title: "Aksi", className: "text-center text-nowrap" });

          const dataSet = [];

          let countData = {
            bug: 0, fitur: 0, revisi: 0,
            tinggi: 0, sedang: 0, rendah: 0,
            open: 0, progress: 0, done: 0
          };

          rows.forEach((row) => {
            const rowData = [""];
            let idTiket = "";
            let valKategori = "";
            let valPrioritas = "";
            let valStatus = "";

            columnIndices.forEach((index, idx) => {
              const cell = row.c[index];
              let cellValue = "";

              if (cell && cell.v !== null) {
                if (typeof cell.v === "string" && cell.v.startsWith("Date(")) {
                  const dateMatch = cell.v.match(/Date\((\d+),\s*(\d+),\s*(\d+)/);
                  if (dateMatch) {
                    const year = dateMatch[1];
                    const month = String(parseInt(dateMatch[2]) + 1).padStart(2, "0");
                    const day = String(dateMatch[3]).padStart(2, "0");
                    cellValue = `${day}/${month}/${year}`;
                  } else {
                    cellValue = cell.v;
                  }
                } else {
                  cellValue = cell.f !== undefined ? cell.f : cell.v;
                }
              }

              if (targetColumns[idx] === "ID_Tiket") idTiket = cellValue;
              if (targetColumns[idx] === "Kategori") valKategori = cellValue.toLowerCase();
              if (targetColumns[idx] === "Prioritas") valPrioritas = cellValue.toLowerCase();
              if (targetColumns[idx] === "Status") valStatus = cellValue.toLowerCase();

              rowData.push(cellValue);
            });

            if (valKategori.includes("bug") || valKategori.includes("error")) countData.bug++;
            else if (valKategori.includes("fitur") || valKategori.includes("baru")) countData.fitur++;
            else if (valKategori.includes("revisi")) countData.revisi++;

            if (valPrioritas === "tinggi" || valPrioritas === "high" || valPrioritas === "urgent") countData.tinggi++;
            else if (valPrioritas === "sedang" || valPrioritas === "normal") countData.sedang++;
            else if (valPrioritas === "rendah" || valPrioritas === "low") countData.rendah++;

            if (valStatus === "open") countData.open++;
            else if (valStatus === "in progress" || valStatus === "pending") countData.progress++;
            else if (valStatus === "done" || valStatus === "closed" || valStatus === "resolved") countData.done++;

            rowData.push(idTiket);
            dataSet.push(rowData);
          });

          dataSet.reverse();

          document.getElementById("count-bug").innerText = countData.bug;
          document.getElementById("count-fitur").innerText = countData.fitur;
          document.getElementById("count-revisi").innerText = countData.revisi;
          document.getElementById("count-tinggi").innerText = countData.tinggi;
          document.getElementById("count-sedang").innerText = countData.sedang;
          document.getElementById("count-rendah").innerText = countData.rendah;
          document.getElementById("count-open").innerText = countData.open;
          document.getElementById("count-progress").innerText = countData.progress;
          document.getElementById("count-done").innerText = countData.done;

          document.getElementById("dashboardStats").style.display = "flex";

          if ($.fn.DataTable.isDataTable("#ticketTable")) {
            $("#ticketTable").DataTable().destroy();
          }

          document.getElementById("data-container").innerHTML = `
              <table id="ticketTable" class="table table-bordered table-hover align-middle w-100">
                <thead class="table-dark"></thead>
              </table>
            `;

          $("#ticketTable").DataTable({
            data: dataSet,
            columns: finalHeaders,
            pageLength: 5,
            lengthMenu: [
              [5, 15, 20, -1],
              [5, 15, 20, "Semua"],
            ],
            scrollX: true,
            ordering: true,

            columnDefs: [
              {
                targets: 0,
                searchable: false,
                orderable: false,
                render: function (data, type, row, meta) {
                  return meta.row + 1;
                },
              },
              {
                targets: 7,
                render: function (data, type, row) {
                  let badgeClass = "bg-secondary";
                  let text = data ? data.toLowerCase() : "";
                  if (text.includes("bug") || text.includes("error")) badgeClass = "bg-danger";
                  else if (text.includes("fitur") || text.includes("baru")) badgeClass = "bg-success";
                  else if (text.includes("revisi")) badgeClass = "bg-info text-dark";
                  return `<span class="badge ${badgeClass}">${data}</span>`;
                },
              },
              {
                targets: 8,
                render: function (data, type, row) {
                  let badgeClass = "bg-secondary";
                  let text = data ? data.toLowerCase() : "";
                  if (text === "tinggi" || text === "high" || text === "urgent") badgeClass = "bg-danger";
                  else if (text === "sedang" || text === "normal") badgeClass = "bg-warning text-dark";
                  else if (text === "rendah" || text === "low") badgeClass = "bg-info text-dark";
                  return `<span class="badge ${badgeClass}">${data}</span>`;
                },
              },
              {
                targets: 9,
                render: function (data, type, row) {
                  let badgeClass = "bg-secondary";
                  let text = data ? data.toLowerCase() : "";
                  if (text === "open") badgeClass = "bg-primary";
                  else if (text === "in progress" || text === "pending") badgeClass = "bg-warning text-dark";
                  else if (text === "done" || text === "closed" || text === "resolved") badgeClass = "bg-success";
                  return `<span class="badge ${badgeClass}">${data}</span>`;
                },
              },
              {
                targets: 10,
                searchable: false,
                orderable: false,
                render: function (data, type, row) {
                  return `
                      <div class="d-flex justify-content-center gap-1">
                        <button class="btn btn-sm btn-info text-white" title="Lihat Detail" onclick="alert('Membuka detail tiket: ${data}')">
                          <i class="bi bi-eye"></i>
                        </button>
                        <button class="btn btn-sm btn-warning text-dark" title="Edit Tiket" onclick="alert('Mengedit tiket: ${data}')">
                          <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-sm btn-danger" title="Hapus Tiket" onclick="alert('Menghapus tiket: ${data}')">
                          <i class="bi bi-trash"></i>
                        </button>
                      </div>
                    `;
                },
              },
            ],

            language: {
              search: "Cari Tiket:",
              lengthMenu: "Tampilkan _MENU_ baris",
              info: "Menampilkan _START_ s/d _END_ dari total _TOTAL_ tiket",
              infoEmpty: "Data kosong",
              infoFiltered: "(disaring dari _MAX_ total tiket)",
              zeroRecords: "Tiket yang dicari tidak ditemukan",
              paginate: {
                first: "Awal",
                last: "Akhir",
                next: "Selanjutnya",
                previous: "Sebelumnya",
              },
            },
          });
        })
        .catch((error) => {
          console.error("Error fetching data:", error);
          document.getElementById("data-container").innerHTML = '<div class="alert alert-danger shadow-sm">Gagal memuat data.</div>';
        });

      const form = document.getElementById('formTambahTiket');
      const btnSubmit = document.getElementById('btnSubmitTiket');

      btnSubmit.addEventListener('click', () => {
        if (!form.checkValidity()) {
          form.reportValidity();
          return;
        }

        btnSubmit.disabled = true;
        btnSubmit.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Mengirim...';

        const formData = {
          namaPelapor: document.getElementById('inputNamaPelapor').value, // DIKIRIM KE GAS
          aplikasi: document.getElementById('inputAplikasi').value,
          modul: document.getElementById('inputModul').value,
          idRef: document.getElementById('inputIDRef').value,
          infoRef: document.getElementById('inputInfoRef').value,
          kategori: document.getElementById('inputKategori').value,
          prioritas: document.getElementById('inputPrioritas').value,
          keterangan: document.getElementById('inputKeterangan').value
        };

        // --- GANTI STRING DI BAWAH INI PAKAI URL WEB APP LU ---
        const webAppUrl = 'https://script.google.com/macros/s/AKfycbxyB74RXe3VIFDeUQamA0wpG8DtuI9RuTP9phjiVejjZ1v_OPP_pwSKAzMrjW__jz-hXA/exec';

        fetch(webAppUrl, {
          method: 'POST',
          mode: 'no-cors',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(formData)
        })
          .then(() => {
            alert('Sukses! Tiket baru berhasil disimpan ke Google Sheets.');
            form.reset();

            const modalEl = document.getElementById('modalTambahTiket');
            const modal = bootstrap.Modal.getInstance(modalEl);
            modal.hide();

            location.reload();
          })
          .catch(error => {
            console.error('Error:', error);
            alert('Gagal simpan data, coba cek kodingan URL lu.');
            btnSubmit.disabled = false;
            btnSubmit.innerHTML = '<i class="bi bi-send me-1"></i> Submit Tiket';
          });
      });
    });
  </script>
