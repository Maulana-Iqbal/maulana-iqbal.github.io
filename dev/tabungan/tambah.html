<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tambah Transaksi Tabungan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      /* Setup Container Vanta biar full screen */
      #vanta-bg {
        width: 100%;
        min-height: 100vh;
        position: relative;
      }

      /* Biar konten form posisinya di atas efek animasi Vanta */
      .form-content {
        position: relative;
        z-index: 1;
      }

      /* Style Glassmorphism */
      .glass-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 15px;
      }
      .form-control,
      .form-select {
        background-color: rgba(0, 0, 0, 0.5) !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
        color: white !important;
      }
      .form-control:focus,
      .form-select:focus {
        border-color: #3fbcff !important;
        box-shadow: 0 0 8px rgba(63, 188, 255, 0.5) !important;
      }
      .form-select option {
        background-color: #080816;
        color: white;
      }
    </style>
  </head>
  <body>
    <div id="vanta-bg">
      <div class="container pt-5 pb-5 form-content">
        <div class="row justify-content-center">
          <div class="col-md-6 text-white">
            <a href="index.html" class="btn btn-outline-light btn-sm mb-4">⬅ Kembali ke Dashboard</a>

            <div class="card glass-card p-4 shadow-lg">
              <h3 class="fw-bold mb-1">Tambah Data Tabungan</h3>
              <p class="text-white-50 small mb-4">Data akan tersimpan langsung ke Google Sheets (Sheet4)</p>

              <form id="formTabungan">
                <div class="mb-3">
                  <label class="form-label text-white-50 small fw-bold">TANGGAL</label>
                  <input type="date" class="form-control" name="tanggal" required />
                </div>

                <div class="mb-3">
                  <label class="form-label text-white-50 small fw-bold">JENIS TABUNGAN</label>
                  <select class="form-select" name="jenis" required>
                    <option value="" disabled selected hidden>Pilih jenis tabungan...</option>
                    <option value="Emas Pegadaian Dana Darurat">Emas Pegadaian Dana Darurat</option>
                    <option value="Tabungan Hari Tua EMAS">Tabungan Hari Tua EMAS</option>
                    <option value="Tabungan Hari Tua BITCOIN">Tabungan Hari Tua BITCOIN</option>
                    <option value="Tabungan EMAS">Tabungan EMAS</option>
                    <option value="Tabungan BITCOIN">Tabungan BITCOIN</option>
                  </select>
                </div>

                <div class="mb-3">
                  <label class="form-label text-white-50 small fw-bold">NOMINAL (RUPIAH)</label>
                  <input type="number" class="form-control" name="nominal" required placeholder="Contoh: 15000000" />
                </div>

                <div class="mb-3">
                  <label class="form-label text-white-50 small fw-bold">JUMLAH (GRAM / COIN)</label>
                  <input type="number" step="any" class="form-control" name="jumlah" required placeholder="Contoh: 5.7512" />
                </div>

                <div class="mb-4">
                  <label class="form-label text-white-50 small fw-bold">KETERANGAN (OPSIONAL)</label>
                  <textarea class="form-control" name="keterangan" rows="2" placeholder="Catatan tambahan..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary w-100 fw-bold shadow" id="btnSimpan">Simpan ke Google Sheets</button>
              </form>

              <div id="alertSukses" class="alert alert-success mt-3 d-none text-center fw-semibold" role="alert">🎉 Data sukses masuk ke Sheet4!</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>

    <script>
      // 1. Inisialisasi Background Vanta.js biar sama persis kayak dashboard
      VANTA.NET({
        el: "#vanta-bg",
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200.0,
        minWidth: 200.0,
        scale: 1.0,
        scaleMobile: 1.0,
        color: 0x3fbcff,
        backgroundColor: 0x080816,
        points: 12.0,
        maxDistance: 20.0,
        spacing: 16.0,
      });

      // ========================================================
      // 2. PASTE URL WEB APP DARI APPS SCRIPT LO DI SINI!
      // ========================================================
      const scriptURL = "https://script.google.com/macros/s/AKfycbx3uiXsB0K9SsrtK1v6FsRCq2KfsuksvuQByquNyhetKVLA6gIL6nw8FA9lH9HYT1Qf/exec";

      const form = document.forms["formTabungan"];
      const btnSimpan = document.getElementById("btnSimpan");
      const alertSukses = document.getElementById("alertSukses");

      form.addEventListener("submit", (e) => {
        e.preventDefault();

        btnSimpan.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Menyimpan...';
        btnSimpan.disabled = true;

        fetch(scriptURL, { method: "POST", body: new FormData(form) })
          .then((response) => {
            alertSukses.classList.remove("d-none");
            form.reset();
            btnSimpan.innerHTML = "Simpan ke Google Sheets";
            btnSimpan.disabled = false;

            setTimeout(() => {
              alertSukses.classList.add("d-none");
            }, 4000);
          })
          .catch((error) => {
            console.error("Error!", error.message);
            alert("Gagal bro! Cek lagi URL script atau koneksi internet lo.");
            btnSimpan.innerHTML = "Simpan ke Google Sheets";
            btnSimpan.disabled = false;
          });
      });
    </script>
  </body>
</html>
