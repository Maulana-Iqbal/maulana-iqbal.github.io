<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabungan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
      /* Hilangkan margin bawaan dan set tinggi full */
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
      }

      /* 2. Setup Container Vanta biar full screen */
      #vanta-bg {
        width: 100%;
        min-height: 100vh;
        position: relative; /* Penting biar konten bisa di atasnya */
      }

      /* 3. Styling konten dashboard biar posisinya di atas canvas animasi */
      .dashboard-content {
        position: relative;
        z-index: 1;
        color: white;
      }

      /* Styling tambahan: bikin card Bootstrap agak transparan (Glassmorphism) */
      .glass-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        border-radius: 15px;
      }
    </style>
  </head>
  <body>
    <div id="vanta-bg">
      <div class="container dashboard-content pt-5">
        <div class="row mb-4">
          <div class="col-12 text-center">
            <h1 class="fw-bold">Tabungan Kita</h1>
          </div>
        </div>

        <div class="row justify-content-center mb-5">
          <div class="col-12 col-md-6 col-lg-4 mb-4">
            <div class="card glass-card h-100 p-3 shadow-lg">
              <div class="card-body text-center">
                <h6 class="card-title text-uppercase text-white-50">Total Emas Dana Darurat</h6>
                <h4 class="card-text fw-bold text-warning mb-0" id="val-c3">Loading...</h4>
                <p class="card-text fw-bold mt-1" id="val-a3">Loading...</p>
              </div>
            </div>
          </div>

          <div class="col-12 col-md-6 col-lg-4 mb-4">
            <div class="card glass-card h-100 p-3 shadow-lg">
              <div class="card-body text-center">
                <h6 class="card-title text-uppercase text-white-50">Tabungan Hari Tua EMAS</h6>
                <h4 class="card-text fw-bold text-success mb-0" id="val-c8">Loading...</h4>
                <p class="card-text fw-bold mt-1" id="val-a8">Loading...</p>
              </div>
            </div>
          </div>

          <div class="col-12 col-md-6 col-lg-4 mb-4">
            <div class="card glass-card h-100 p-3 shadow-lg">
              <div class="card-body text-center">
                <h6 class="card-title text-uppercase text-white-50">Tabungan Hari Tua BITCOIN</h6>
                <h4 class="card-text fw-bold text-info mb-0" id="val-c13">Loading...</h4>
                <p class="card-text fw-bold mt-1" id="val-a13">Loading...</p>
              </div>
            </div>
          </div>

          <div class="col-12 col-md-6 col-lg-4 mb-4">
            <div class="card glass-card h-100 p-3 shadow-lg">
              <div class="card-body text-center">
                <h6 class="card-title text-uppercase text-white-50">Tabungan EMAS</h6>
                <h4 class="card-text fw-bold text-primary mb-0" id="val-c18">Loading...</h4>
                <p class="card-text fw-bold mt-1" id="val-a18">Loading...</p>
              </div>
            </div>
          </div>

          <div class="col-12 col-md-6 col-lg-4 mb-4">
            <div class="card glass-card h-100 p-3 shadow-lg">
              <div class="card-body text-center">
                <h6 class="card-title text-uppercase text-white-50">Tabungan BITCOIN</h6>
                <h4 class="card-text fw-bold text-light mb-0" id="val-c23">Loading...</h4>
                <p class="card-text fw-bold mt-1" id="val-a23">Loading...</p>
              </div>
            </div>
          </div>

          <div class="row justify-content-center mb-5">
            <div class="col-12 col-lg-10">
              <div class="card glass-card p-4 shadow-lg">
                <h5 class="fw-bold text-white mb-3">📈 Grafik Pertumbuhan Tabungan</h5>
                <div style="position: relative; height: 350px; width: 100%">
                  <canvas id="grafikTabungan"></canvas>
                </div>
              </div>
            </div>
          </div>

          <a href="tambah.html" class="btn btn-outline-light mb-4">➕ Tambah Data Baru</a>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>

    <script>
      VANTA.NET({
        el: "#vanta-bg", // Nembak div id="vanta-bg"
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200.0,
        minWidth: 200.0,
        scale: 1.0,
        scaleMobile: 1.0,
        // Warna bisa lo ganti pakai kode hex (tambahin 0x di depannya)
        color: 0x3fbcff, // Warna garis
        backgroundColor: 0x080816, // Warna background belakang
        points: 12.0,
        maxDistance: 20.0,
        spacing: 16.0,
      });

      // Fungsi buat animasi counting
      function animateCounter(elementId, targetValue, duration) {
        const obj = document.getElementById(elementId);
        if (!obj || !targetValue) return;

        // 1. Ambil cuma angka, titik, dan koma dari teks (misal: "Rp 15.000.000" -> "15.000.000")
        const onlyNumbers = targetValue.replace(/[^0-9,.]/g, "");
        if (!onlyNumbers) {
          obj.innerText = targetValue; // Kalau ga ada angka, langsung tampilin aja
          return;
        }

        // 2. Cari awalan (prefix) dan akhiran (suffix) teksnya
        const prefix = targetValue.split(onlyNumbers)[0] || "";
        const suffix = targetValue.split(onlyNumbers)[1] || "";

        // 3. Ubah format angka Indo ke format mesin (hapus titik ribuan, ubah koma desimal jadi titik)
        const cleanNumber = parseFloat(onlyNumbers.replace(/\./g, "").replace(",", "."));
        if (isNaN(cleanNumber)) {
          obj.innerText = targetValue;
          return;
        }

        // 4. Proses Animasi
        let startTimestamp = null;
        const step = (timestamp) => {
          if (!startTimestamp) startTimestamp = timestamp;
          // Hitung progres (0 sampai 1)
          const progress = Math.min((timestamp - startTimestamp) / duration, 1);

          // Hitung angka saat ini berdasarkan progres
          const currentNum = progress * cleanNumber;

          let formattedNum;
          // Cek kalau angkanya desimal (punya koma)
          if (onlyNumbers.includes(",")) {
            const decimals = onlyNumbers.split(",")[1].length;
            formattedNum = currentNum.toFixed(decimals).replace(".", ","); // Balikin format koma
          } else {
            // Angka bulat (otomatis kasih titik ribuan)
            formattedNum = Math.floor(currentNum).toLocaleString("id-ID");
          }

          // Tampilkan ke HTML
          obj.innerText = prefix + formattedNum + suffix;

          // Lanjut animasi kalau belum selesai
          if (progress < 1) {
            window.requestAnimationFrame(step);
          } else {
            // Pastikan hasil akhir sama persis 100% kayak di Spreadsheet
            obj.innerText = targetValue;
          }
        };

        window.requestAnimationFrame(step);
      }
      const urlSheets = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRk8HUQrb0tNGed3S0Cm6XOces6c5CSJyJtc7hRr8PRCQ1zSowUgkLU8DKSY8WaW4zVnwXyapN5Q7Xc/pub?gid=87019778&single=true&output=csv";

      Papa.parse(urlSheets, {
        download: true,
        header: false, // Biar kebaca sebagai array 2D
        skipEmptyLines: false, // PENTING: Jangan skip baris kosong agar urutan baris sesuai Excel
        complete: function (results) {
          const data = results.data;

          // Pastikan data cukup panjang sebelum di-render
          if (data.length >= 23) {
            // Durasi animasi dalam milidetik (2000 = 2 detik)
            const durasi = 2000;

            // Card 1: Row 3 (Index 2)
            animateCounter("val-c3", data[2][2] || "-", durasi);
            animateCounter("val-a3", data[2][0] || "-", durasi);

            // Card 2: Row 8 (Index 7)
            animateCounter("val-c8", data[7][2] || "-", durasi);
            animateCounter("val-a8", data[7][0] || "-", durasi);

            // Card 3: Row 13 (Index 12)
            animateCounter("val-c13", data[12][2] || "-", durasi);
            animateCounter("val-a13", data[12][0] || "-", durasi);

            // Card 4: Row 18 (Index 17)
            animateCounter("val-c18", data[17][2] || "-", durasi);
            animateCounter("val-a18", data[17][0] || "-", durasi);

            // Card 5: Row 23 (Index 22)
            animateCounter("val-c23", data[22][2] || "-", durasi);
            animateCounter("val-a23", data[22][0] || "-", durasi);
          }
        },
        error: function (error) {
          console.error("Gagal load CSV:", error);
        },
      });
    </script>
    <script>
      // =======================================================
      // KODINGAN FIX ULTIMATE: SUPER DATE PARSER (ANTI 2-DIGIT YEAR)
      // =======================================================

      const urlSheet4 = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRk8HUQrb0tNGed3S0Cm6XOces6c5CSJyJtc7hRr8PRCQ1zSowUgkLU8DKSY8WaW4zVnwXyapN5Q7Xc/pub?gid=268369224&single=true&output=csv"; // Jangan lupa URL Sheet4 lo

      Papa.parse(urlSheet4, {
        download: true,
        header: false,
        skipEmptyLines: true,
        complete: function (results) {
          let rawData = results.data;
          if (isNaN(rawData[0][0])) rawData.shift();

          let parsedRows = [];

          // 1. BACA & BERSIHKAN DATA
          rawData.forEach((row) => {
            if (row.length > 3 && row[1]) {
              let dateStr = row[1].trim();
              let jenis = row[2] ? row[2].trim() : "";
              let rawNominal = row[3] || "0";

              let cleanNominal = rawNominal.split(",")[0].replace(/[^0-9-]/g, "");
              let nominalMasuk = parseInt(cleanNominal) || 0;

              // --- SUPER DATE PARSER ---
              let tglObj;
              let parts = dateStr.split(/[-/]/);

              if (parts.length === 3) {
                let day, month, year;

                // Cek apakah format YYYY di depan (contoh: 2026-01-31)
                if (parts[0].length === 4) {
                  year = parseInt(parts[0]);
                  month = parseInt(parts[1]);
                  day = parseInt(parts[2]);
                }
                // Jika format DD/MM/YYYY atau DD/MM/YY (contoh: 31/01/2026 atau 31/01/26)
                else {
                  day = parseInt(parts[0]);
                  month = parseInt(parts[1]);
                  year = parseInt(parts[2]);

                  // FIX: Kalau tahunnya cuma 2 digit (misal 25), tambahin 2000 biar jadi 2025
                  if (year < 100) {
                    year += 2000;
                  }
                }
                tglObj = new Date(year, month - 1, day);
              } else {
                tglObj = new Date(dateStr);
              }

              // Kalau tanggal berhasil dikenali, masukkan ke antrean
              if (!isNaN(tglObj.getTime())) {
                parsedRows.push({
                  dateObj: tglObj,
                  jenis: jenis,
                  nominal: nominalMasuk,
                });
              }
            }
          });

          // 2. URUTKAN DATA KRONOLOGIS (WAJIB BIAR GRAFIK LURUS)
          parsedRows.sort((a, b) => a.dateObj - b.dateObj);

          // 3. HITUNG KUMULATIF PER BULAN
          let currentBalances = {
            "Emas Pegadaian Dana Darurat": 0,
            "Tabungan Hari Tua EMAS": 0,
            "Tabungan Hari Tua BITCOIN": 0,
            "Tabungan EMAS": 0,
            "Tabungan BITCOIN": 0,
          };

          let dataPerBulan = {};
          const namaBulan = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Ags", "Sep", "Okt", "Nov", "Des"];

          parsedRows.forEach((row) => {
            if (currentBalances.hasOwnProperty(row.jenis)) {
              currentBalances[row.jenis] += row.nominal;
            }

            let yyyy = row.dateObj.getFullYear();
            let mm = row.dateObj.getMonth();
            let keyBulan = `${yyyy}-${String(mm + 1).padStart(2, "0")}`;
            let labelCantik = `${namaBulan[mm]} ${yyyy}`;

            dataPerBulan[keyBulan] = {
              labelX: labelCantik,
              balances: { ...currentBalances },
            };
          });

          // 4. SIAPKAN UNTUK CHART.JS
          let labelTanggal = [];
          let datasetPoints = {
            "Emas Pegadaian Dana Darurat": [],
            "Tabungan Hari Tua EMAS": [],
            "Tabungan Hari Tua BITCOIN": [],
            "Tabungan EMAS": [],
            "Tabungan BITCOIN": [],
          };

          let sortedKeys = Object.keys(dataPerBulan).sort();

          sortedKeys.forEach((key) => {
            let infoBulan = dataPerBulan[key];
            labelTanggal.push(infoBulan.labelX);

            Object.keys(datasetPoints).forEach((kategori) => {
              datasetPoints[kategori].push(infoBulan.balances[kategori]);
            });
          });

          // 5. RENDER GRAFIK
          const colors = {
            "Emas Pegadaian Dana Darurat": "#ffd700",
            "Tabungan Hari Tua EMAS": "#ff8c00",
            "Tabungan Hari Tua BITCOIN": "#ff4500",
            "Tabungan EMAS": "#b8860b",
            "Tabungan BITCOIN": "#00ffcc",
          };

          let formatedDatasets = Object.keys(datasetPoints).map((kategori) => {
            return {
              label: kategori,
              data: datasetPoints[kategori],
              borderColor: colors[kategori] || "#ffffff",
              backgroundColor: "transparent",
              borderWidth: 2.5,
              tension: 0.3,
              pointRadius: 3,
              pointHoverRadius: 6,
            };
          });

          const ctx = document.getElementById("grafikTabungan").getContext("2d");
          new Chart(ctx, {
            type: "line",
            data: {
              labels: labelTanggal,
              datasets: formatedDatasets,
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { labels: { color: "white", font: { size: 11 } } },
                tooltip: { mode: "index", intersect: false },
              },
              scales: {
                x: {
                  ticks: { color: "rgba(255,255,255,0.7)", maxTicksLimit: 12 },
                  grid: { color: "rgba(255,255,255,0.05)" },
                },
                y: {
                  beginAtZero: true,
                  ticks: {
                    color: "rgba(255,255,255,0.7)",
                    callback: function (value) {
                      if (value >= 1000000000) return (value / 1000000000).toFixed(1) + " M";
                      if (value >= 1000000) return (value / 1000000).toFixed(0) + " Jt";
                      return value;
                    },
                  },
                  grid: { color: "rgba(255,255,255,0.05)" },
                },
              },
            },
          });
        },
        error: function (error) {
          console.error("Gagal memuat grafik kategori:", error);
        },
      });
    </script>
  </body>
</html>
